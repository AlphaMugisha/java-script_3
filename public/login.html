<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white border border-gray-300 p-8 rounded-2xl shadow-lg w-full max-w-sm">
    
    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Login</h2>
    
    <form id="loginForm" class="space-y-4">
      
      <input 
        type="email" 
        id="email" 
        placeholder="Email" 
        required 
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      
      <input 
        type="password" 
        id="password" 
        placeholder="Password" 
        required 
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
      />
      
      <button 
        type="submit"
        class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition duration-300"
      >
        Login
      </button>
      
    </form>
    
    <p class="text-sm text-center mt-4 text-gray-600">
      Don't have an account? 
      <a href="/register" class="text-blue-600 hover:underline font-medium">
        Register here
      </a>
    </p>

  </div>

  <script>
    const form = document.getElementById("loginForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/users/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.status === 200) {
        window.location.href = `/dashboard.html?username=${encodeURIComponent(data.username)}`;
      } else {
        alert(data.message);
      }
    });
  </script>

</body>
</html>
