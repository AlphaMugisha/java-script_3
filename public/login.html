<!DOCTYPE html>
<html>
<head>
  <title>Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-xl shadow-lg w-96">
  <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

  <input id="email" type="email" placeholder="Email"
    class="w-full border p-3 mb-4 rounded-lg">

  <input id="password" type="password" placeholder="Password"
    class="w-full border p-3 mb-6 rounded-lg">

  <button onclick="login()"
    class="w-full bg-green-600 text-white py-3 rounded-lg hover:bg-green-700">
    Login
  </button>

  <p class="text-center mt-4">
    No account?
    <a href="/register.html" class="text-green-600 font-semibold">
      Register
    </a>
  </p>
</div>

<script>
async function login() {
  const res = await fetch("/api/users/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({
      email: document.getElementById("email").value,
      password: document.getElementById("password").value
    })
  });

  const data = await res.json();

  if (res.ok) {
    localStorage.setItem("user", data.username);
    window.location.href = "/dashboard.html";
  } else {
    alert(data.message);
  }
}
</script>

</body>
</html>
