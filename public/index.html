<!DOCTYPE html>
<html>
<head>
  <title>Inventory Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-gray-900 text-white flex flex-col p-6">
    <h2 class="text-2xl font-bold mb-8">Shop Admin</h2>
    <nav class="space-y-4">
      <a href="#" class="block hover:text-green-400">Dashboard</a>
      <a href="#" class="block text-green-400 font-semibold">Products</a>
      <a href="#" class="block hover:text-green-400">Users</a>
    </nav>
  </aside>

  <!-- MAIN CONTENT -->
  <div class="flex-1 p-10">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-10">
      <h1 class="text-3xl font-bold text-gray-800">Product Management</h1>
      <span class="text-gray-600">Admin Panel</span>
    </div>

    <div class="grid grid-cols-3 gap-8">

      <!-- ADD PRODUCT CARD -->
      <div class="col-span-1 bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-xl font-semibold mb-6 text-gray-700">
          Add New Product
        </h2>

        <div class="space-y-4">
          <input id="name" placeholder="Product Name"
            class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />

          <input id="price" type="number" placeholder="Price"
            class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />

          <input id="stock" type="number" placeholder="Stock"
            class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />

          <input id="category" placeholder="Category"
            class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500" />

          <textarea id="description" placeholder="Description"
            class="w-full border border-gray-300 p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"></textarea>

          <button onclick="addProduct()"
            class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-lg transition duration-200">
            Save Product
          </button>
        </div>
      </div>

      <!-- PRODUCT TABLE -->
      <div class="col-span-2 bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-xl font-semibold mb-6 text-gray-700">
          Product List
        </h2>

        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr class="border-b bg-gray-50">
                <th class="p-3">Name</th>
                <th class="p-3">Price</th>
                <th class="p-3">Stock</th>
                <th class="p-3">Category</th>
              </tr>
            </thead>
            <tbody id="productTable" class="divide-y"></tbody>
          </table>
        </div>
      </div>

    </div>

  </div>

<script>
async function fetchProducts() {
  const res = await fetch("/api/products");
  const products = await res.json();

  const table = document.getElementById("productTable");
  table.innerHTML = "";

  products.forEach(p => {
    table.innerHTML += `
      <tr class="hover:bg-gray-50 transition">
        <td class="p-3">${p.name}</td>
        <td class="p-3">$${p.price}</td>
        <td class="p-3">${p.stock}</td>
        <td class="p-3">${p.category}</td>
      </tr>
    `;
  });
}

async function addProduct() {
  const product = {
    name: document.getElementById("name").value,
    price: Number(document.getElementById("price").value),
    stock: Number(document.getElementById("stock").value),
    category: document.getElementById("category").value,
    description: document.getElementById("description").value,
  };

  const res = await fetch("/api/products", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(product),
  });

  await res.json();

  fetchProducts();

  // Clear form after submit
  document.querySelectorAll("input, textarea").forEach(el => el.value = "");
}

fetchProducts();
</script>

</body>
</html>
