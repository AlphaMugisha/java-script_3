<!DOCTYPE html>
<html>
<head>
  <title>Inventory</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-10">

<h1 class="text-3xl font-bold mb-6">Inventory</h1>

<div class="grid grid-cols-2 gap-8">

  <!-- FORM -->
  <div class="bg-white p-6 rounded shadow">
    <h2 class="text-xl mb-4 font-semibold">Add Product</h2>

    <input id="name" placeholder="Name" class="border p-2 w-full mb-3 rounded" />
    <input id="price" type="number" placeholder="Price" class="border p-2 w-full mb-3 rounded" />
    <input id="stock" type="number" placeholder="Stock" class="border p-2 w-full mb-3 rounded" />
    <input id="category" placeholder="Category" class="border p-2 w-full mb-3 rounded" />
    <textarea id="description" placeholder="Description" class="border p-2 w-full mb-3 rounded"></textarea>

    <button onclick="addProduct()" class="bg-green-600 text-white px-4 py-2 rounded w-full">
      Save Product
    </button>
  </div>

  <!-- TABLE -->
  <div class="bg-white p-6 rounded shadow">
    <h2 class="text-xl mb-4 font-semibold">Products</h2>
    <table class="w-full">
      <thead>
        <tr class="border-b">
          <th class="text-left p-2">Name</th>
          <th class="text-left p-2">Price</th>
          <th class="text-left p-2">Stock</th>
        </tr>
      </thead>
      <tbody id="productTable"></tbody>
    </table>
  </div>

</div>

<script>
async function fetchProducts() {
  const res = await fetch("/api/products");
  const products = await res.json();

  const table = document.getElementById("productTable");
  table.innerHTML = "";

  products.forEach(p => {
    table.innerHTML += `
      <tr class="border-b">
        <td class="p-2">${p.name}</td>
        <td class="p-2">${p.price}</td>
        <td class="p-2">${p.stock}</td>
      </tr>
    `;
  });
}

async function addProduct() {
  const product = {
    name: document.getElementById("name").value,
    price: Number(document.getElementById("price").value),
    stock: Number(document.getElementById("stock").value),
    category: document.getElementById("category").value,
    description: document.getElementById("description").value,
  };

  const res = await fetch("/api/products", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(product),
  });

  const data = await res.json();
  console.log("Created:", data);

  fetchProducts();
}

fetchProducts();
</script>

</body>
</html>
