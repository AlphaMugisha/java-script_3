<!DOCTYPE html>
<html>
<head>
  <title>Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

  <div class="bg-white border border-gray-300 p-8 rounded-2xl shadow-lg w-full max-w-sm">
    
    <h2 class="text-2xl font-bold text-center mb-6 text-gray-800">Register</h2>
    
    <form id="registerForm" class="space-y-4">
      
      <input 
        type="text" 
        id="username" 
        placeholder="Username" 
        required 
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
      />
      
      <input 
        type="email" 
        id="email" 
        placeholder="Email" 
        required 
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
      />
      
      <input 
        type="password" 
        id="password" 
        placeholder="Password" 
        required 
        class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500"
      />
      
      <button 
        type="submit"
        class="w-full bg-green-600 text-white py-2 rounded-lg hover:bg-green-700 transition duration-300"
      >
        Register
      </button>
      
    </form>
    
    <p class="text-sm text-center mt-4 text-gray-600">
      Already have an account? 
      <a href="/" class="text-green-600 hover:underline font-medium">
        Login here
      </a>
    </p>

  </div>

  <script>
    const form = document.getElementById("registerForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value;
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      const res = await fetch("/api/users/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
      });
      const data = await res.json();
      alert(data.message);
    });
  </script>

</body>
</html>
